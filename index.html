<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Interview Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #2a2a3a;
    --accent: #f0c040;
    --accent2: #7b61ff;
    --accent3: #00e5b0;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --done: #00e5b0;
    --tag-bg: #1e1e2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .brand-icon {
    width: 34px;
    height: 34px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: #000;
  }

  .brand-text {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .brand-sub {
    font-size: 10px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .progress-wrap {
    margin-top: 4px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 6px;
  }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent3));
    border-radius: 2px;
    transition: width 0.5s ease;
    width: 0%;
  }

  .nav-list {
    list-style: none;
    overflow-y: auto;
    flex: 1;
    padding: 12px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 24px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 3px solid transparent;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    position: relative;
  }

  .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }

  .nav-item.active {
    background: rgba(240,192,64,0.07);
    color: var(--accent);
    border-left-color: var(--accent);
  }

  .nav-item.done {
    color: var(--done);
  }

  .nav-item.done .nav-check { background: var(--done); border-color: var(--done); }
  .nav-item.done .nav-check::after { opacity: 1; }

  .nav-num {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    min-width: 18px;
  }

  .nav-check {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    margin-left: auto;
  }

  .nav-check::after {
    content: '✓';
    font-size: 9px;
    color: #000;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .sidebar-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  /* ── MAIN ── */
  .main {
    padding: 40px 48px;
    max-width: 900px;
  }

  .topic-header {
    margin-bottom: 36px;
    animation: fadeUp 0.4s ease;
  }

  .topic-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 16px;
  }

  .topic-dot {
    width: 6px;
    height: 6px;
    background: var(--accent3);
    border-radius: 50%;
    animation: blink 2s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .topic-title {
    font-size: 36px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }

  .topic-title span { color: var(--accent); }

  .topic-meta {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .meta-pill {
    background: var(--tag-bg);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
  }

  .meta-pill.hard { border-color: #ff5566; color: #ff5566; }
  .meta-pill.med { border-color: var(--accent); color: var(--accent); }
  .meta-pill.easy { border-color: var(--accent3); color: var(--accent3); }

  /* Answer Card */
  .answer-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 24px;
    animation: fadeUp 0.4s ease;
    transition: border-color 0.2s;
  }

  .answer-card:hover { border-color: rgba(255,255,255,0.12); }

  .card-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .card-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .card-q {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
  }

  .expand-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 10px;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .expand-btn:hover { border-color: var(--accent); color: var(--accent); }

  .card-body {
    padding: 0 24px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease, padding 0.3s ease;
  }

  .card-body.open {
    max-height: 2000px;
    padding: 24px;
  }

  .explanation {
    font-size: 14px;
    line-height: 1.75;
    color: #b8b8cc;
    margin-bottom: 16px;
  }

  .explanation strong { color: var(--text); }

  pre {
    background: #0d0d14;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    overflow-x: auto;
    margin: 16px 0;
    position: relative;
  }

  pre code {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
    color: #c8c8e8;
  }

  .lang-badge {
    position: absolute;
    top: 10px;
    right: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .tip-box {
    background: rgba(123,97,255,0.08);
    border: 1px solid rgba(123,97,255,0.25);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: #a89fff;
    margin-top: 12px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .tip-icon { font-size: 14px; flex-shrink: 0; }

  .key-points {
    list-style: none;
    margin: 12px 0;
  }

  .key-points li {
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 13.5px;
    color: #b8b8cc;
    display: flex;
    gap: 10px;
  }

  .key-points li::before {
    content: '→';
    color: var(--accent3);
    font-family: 'Space Mono', monospace;
    flex-shrink: 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
    margin: 16px 0;
  }

  th {
    background: rgba(255,255,255,0.04);
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 9px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: #b8b8cc;
    font-family: 'Space Mono', monospace;
    font-size: 11.5px;
    vertical-align: top;
  }

  td:first-child { color: var(--accent); }

  code.inline {
    background: rgba(255,255,255,0.07);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent3);
  }

  .mark-done-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 20px;
    background: rgba(0,229,176,0.08);
    border: 1px solid rgba(0,229,176,0.25);
    border-radius: 8px;
    padding: 10px 16px;
    color: var(--done);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    width: fit-content;
  }

  .mark-done-btn:hover { background: rgba(0,229,176,0.15); }
  .mark-done-btn.marked { background: rgba(0,229,176,0.15); }

  /* Nav Controls */
  .nav-controls {
    display: flex;
    gap: 12px;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  .ctrl-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    padding: 12px 20px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ctrl-btn.primary { background: var(--accent); color: #000; border-color: var(--accent); }
  .ctrl-btn.primary:hover { background: #ffd060; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Keyword highlights */
  .kw-yellow { color: var(--accent); }
  .kw-green { color: var(--accent3); }
  .kw-purple { color: #a89fff; }
  .kw-red { color: #ff8899; }

  /* Scrollbar */
  .nav-list::-webkit-scrollbar { width: 4px; }
  .nav-list::-webkit-scrollbar-track { background: transparent; }
  .nav-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: relative; height: auto; }
    .main { padding: 24px 20px; }
    .topic-title { font-size: 26px; }
  }
</style>
</head>
<body>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-icon">JS</div>
        <div>
          <div class="brand-text">Interview Prep</div>
          <div class="brand-sub">Revision Playlist</div>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span>Progress</span>
          <span id="prog-text">0 / 8</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
      </div>
    </div>
    <ul class="nav-list" id="nav-list"></ul>
    <div class="sidebar-footer">
      <div>16 topics · Beginner + Intermediate</div>
      <div style="margin-top:4px;color:#3d3d55;">Click any topic to start revision</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main-content"></main>
</div>

<script>
const topics = [
  {
    id: 0,
    title: "Data Types in JavaScript",
    difficulty: "easy",
    icon: "🗂",
    color: "#00e5b0",
    iconBg: "rgba(0,229,176,0.1)",
    question: "What are the different data types in JavaScript?",
    cards: [
      {
        q: "Overview: Primitive vs Reference Types",
        icon: "📦",
        iconBg: "rgba(240,192,64,0.1)",
        content: `
          <p class="explanation">JavaScript has <strong>8 data types</strong> split into two categories — Primitives (stored by value) and Reference types (stored by reference).</p>
          <table>
            <tr><th>Type</th><th>Category</th><th>Example</th><th>Description</th></tr>
            <tr><td>String</td><td>Primitive</td><td>"hello"</td><td>Text data</td></tr>
            <tr><td>Number</td><td>Primitive</td><td>42, 3.14</td><td>Integers & floats</td></tr>
            <tr><td>BigInt</td><td>Primitive</td><td>999n</td><td>Very large integers</td></tr>
            <tr><td>Boolean</td><td>Primitive</td><td>true / false</td><td>Logical values</td></tr>
            <tr><td>undefined</td><td>Primitive</td><td>let x;</td><td>Declared, not assigned</td></tr>
            <tr><td>null</td><td>Primitive</td><td>let x = null</td><td>Intentional empty value</td></tr>
            <tr><td>Symbol</td><td>Primitive</td><td>Symbol("id")</td><td>Unique identifiers</td></tr>
            <tr><td>Object</td><td>Reference</td><td>{}, [], fn(){}</td><td>Collection / complex data</td></tr>
          </table>
        `
      },
      {
        q: "Primitive vs Reference — the KEY difference",
        icon: "⚡",
        iconBg: "rgba(123,97,255,0.1)",
        content: `
          <p class="explanation"><strong>Primitives</strong> are copied by value — changing one variable doesn't affect the other. <strong>Objects</strong> are copied by reference — both variables point to the same memory.</p>
          <pre><code><span class="kw-yellow">// Primitive — copy by VALUE</span>
let a = 10;
let b = a;
b = 20;
console.log(a); <span class="kw-green">// 10 — unchanged ✅</span>

<span class="kw-yellow">// Object — copy by REFERENCE</span>
let obj1 = { name: <span class="kw-green">"Alice"</span> };
let obj2 = obj1;
obj2.name = <span class="kw-green">"Bob"</span>;
console.log(obj1.name); <span class="kw-red">// "Bob" — both affected! ⚠️</span>

<span class="kw-yellow">// typeof operator</span>
typeof <span class="kw-green">"hello"</span>    <span class="kw-green">// "string"</span>
typeof 42         <span class="kw-green">// "number"</span>
typeof true       <span class="kw-green">// "boolean"</span>
typeof undefined  <span class="kw-green">// "undefined"</span>
typeof null       <span class="kw-red">// "object" ← known JS bug!</span>
typeof {}         <span class="kw-green">// "object"</span>
typeof []         <span class="kw-green">// "object" (arrays are objects)</span></code></pre>
          <div class="tip-box"><span class="tip-icon">💡</span><span>Interview tip: <strong>typeof null === "object"</strong> is a famous JavaScript bug that exists for legacy compatibility reasons.</span></div>
        `
      }
    ]
  },
  {
    id: 1,
    title: "var vs let vs const",
    difficulty: "med",
    icon: "📝",
    color: "#f0c040",
    iconBg: "rgba(240,192,64,0.1)",
    question: "Explain the difference between var, let, and const.",
    cards: [
      {
        q: "Scope, Hoisting & Re-declaration Rules",
        icon: "🔒",
        iconBg: "rgba(240,192,64,0.1)",
        content: `
          <table>
            <tr><th>Feature</th><th>var</th><th>let</th><th>const</th></tr>
            <tr><td>Scope</td><td>Function</td><td>Block</td><td>Block</td></tr>
            <tr><td>Hoisted</td><td>Yes (undefined)</td><td>Yes (TDZ)</td><td>Yes (TDZ)</td></tr>
            <tr><td>Re-declare</td><td>✅ Yes</td><td>❌ No</td><td>❌ No</td></tr>
            <tr><td>Reassign</td><td>✅ Yes</td><td>✅ Yes</td><td>❌ No</td></tr>
          </table>
          <p class="explanation" style="margin-top:12px;"><strong>TDZ</strong> = Temporal Dead Zone — accessing a let/const before its declaration throws a ReferenceError, unlike var which returns undefined.</p>
        `
      },
      {
        q: "Code Examples — var leaks, let is safe",
        icon: "💻",
        iconBg: "rgba(0,229,176,0.1)",
        content: `
          <pre><code><span class="kw-yellow">// VAR — function scoped, hoisting issues</span>
console.log(x); <span class="kw-green">// undefined (hoisted — no error!)</span>
var x = 5;

if (true) {
  var x = 100; <span class="kw-red">// overwrites outer x! ❌</span>
}
console.log(x); <span class="kw-red">// 100 — leaked out of block</span>

<span class="kw-yellow">// LET — block scoped, safe</span>
let y = 5;
if (true) {
  let y = 100; <span class="kw-green">// completely separate variable ✅</span>
}
console.log(y); <span class="kw-green">// 5 — safe!</span>

<span class="kw-yellow">// CONST — must be initialized immediately</span>
const PI = 3.14;
<span class="kw-red">// PI = 3.14159; // ❌ TypeError</span>

<span class="kw-yellow">// CONST object — reference is const, content is mutable</span>
const user = { name: <span class="kw-green">"Alice"</span> };
user.name = <span class="kw-green">"Bob"</span>; <span class="kw-green">// ✅ allowed!</span>
<span class="kw-red">// user = {}; // ❌ cannot reassign</span></code></pre>
          <div class="tip-box"><span class="tip-icon">💡</span><span>Rule of thumb: <strong>const</strong> by default → <strong>let</strong> when reassignment needed → <strong>never use var</strong> in modern code.</span></div>
        `
      }
    ]
  },
  {
    id: 2,
    title: "== vs === (Equality)",
    difficulty: "easy",
    icon: "⚖",
    color: "#ff8899",
    iconBg: "rgba(255,136,153,0.1)",
    question: "What is the difference between == and === in JavaScript?",
    cards: [
      {
        q: "Loose vs Strict Equality",
        icon: "🔍",
        iconBg: "rgba(255,136,153,0.1)",
        content: `
          <p class="explanation"><code class="inline">==</code> performs <strong>type coercion</strong> before comparison. <code class="inline">===</code> checks both <strong>value AND type</strong> — no coercion.</p>
          <pre><code><span class="kw-yellow">// == Loose Equality — converts types first</span>
console.log(0 == false);        <span class="kw-green">// true  (false → 0)</span>
console.log("" == false);       <span class="kw-green">// true  ("" → 0, false → 0)</span>
console.log(null == undefined); <span class="kw-green">// true  (special case)</span>
console.log("5" == 5);          <span class="kw-green">// true  ("5" → 5)</span>
console.log([] == false);       <span class="kw-green">// true  ([] → "" → 0)</span>

<span class="kw-yellow">// === Strict Equality — NO type conversion</span>
console.log(0 === false);       <span class="kw-red">// false (number ≠ boolean)</span>
console.log("" === false);      <span class="kw-red">// false</span>
console.log(null === undefined); <span class="kw-red">// false</span>
console.log("5" === 5);         <span class="kw-red">// false (string ≠ number)</span>
console.log(5 === 5);           <span class="kw-green">// true ✅</span></code></pre>
          <div class="tip-box"><span class="tip-icon">💡</span><span>Always use <strong>===</strong>. The only safe use of == is <code style="font-family:Space Mono">x == null</code> to check for both null and undefined at once.</span></div>
        `
      }
    ]
  },
  {
    id: 3,
    title: "Arrow Functions",
    difficulty: "med",
    icon: "➡",
    color: "#7b61ff",
    iconBg: "rgba(123,97,255,0.1)",
    question: "What are arrow functions and how do they differ from regular functions?",
    cards: [
      {
        q: "Syntax Comparison",
        icon: "✍",
        iconBg: "rgba(123,97,255,0.1)",
        content: `
          <pre><code><span class="kw-yellow">// Regular function</span>
function greet(name) {
  return <span class="kw-green">"Hello, "</span> + name;
}

<span class="kw-yellow">// Arrow function — concise</span>
const greet = (name) => <span class="kw-green">"Hello, "</span> + name;

<span class="kw-yellow">// Single param → parentheses optional</span>
const square = n => n * n;

<span class="kw-yellow">// No params → parentheses required</span>

  try {
    const res  = await fetch(<span class="kw-green">\`/api/users/\${id}\`</span>);

      throw new Error(<span class="kw-green">\`HTTP error! Status: \${res.status}\`</span>);

    return user;

  } catch (error) {
    console.error(<span class="kw-red">'Fetch failed:'</span>, error.message);
    return null; <span class="kw-purple">// graceful fallback</span>

    console.log(<span class="kw-green">'Request completed'</span>); <span class="kw-purple">// always runs</span>

const difficultyLabel = { easy: "Easy", med: "Medium", hard: "Hard" };
let doneSet = new Set(JSON.parse(localStorage.getItem('js_done') || '[]'));
let currentTopic = 0;

function saveDone() {
  localStorage.setItem('js_done', JSON.stringify([...doneSet]));
}

function updateProgress() {
  const count = doneSet.size;
  document.getElementById('prog-text').textContent = `${count} / ${topics.length}`;
  document.getElementById('prog-fill').style.width = `${(count / topics.length) * 100}%`;
}

function buildNav() {
  const list = document.getElementById('nav-list');
  list.innerHTML = '';
  let lastSection = null;
  topics.forEach((t, i) => {
    const section = t.section || 'Beginner';
    if (section !== lastSection) {
      const sep = document.createElement('li');
      sep.style.cssText = 'padding:10px 24px 4px;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:#3d3d55;font-family:Space Mono,monospace;pointer-events:none;border-top:' + (lastSection ? '1px solid #1e1e2e' : 'none') + ';margin-top:' + (lastSection ? '8px' : '0');
      sep.textContent = section;
      list.appendChild(sep);
      lastSection = section;
    }
    const li = document.createElement('li');
    const num = (i + 1).toString().padStart(2, '0');
    li.className = 'nav-item' + (i === currentTopic ? ' active' : '') + (doneSet.has(i) ? ' done' : '');
    li.innerHTML = `
      <span class="nav-num">${num}</span>
      <span style="flex:1;line-height:1.3;">${t.title}</span>
      <span class="nav-check"></span>
    `;
    li.onclick = () => { currentTopic = i; render(); };
    list.appendChild(li);
  });
  updateProgress();
}

function buildCards(cards, topicId) {
  return cards.map((card, ci) => `
    <div class="answer-card">
      <div class="card-header" onclick="toggleCard(${topicId},${ci})">
        <div class="card-icon" style="background:${card.iconBg}">${card.icon}</div>
        <div class="card-q">${card.q}</div>
        <button class="expand-btn" onclick="toggleCard(${topicId},${ci});event.stopPropagation()" id="ebtn-${topicId}-${ci}">SHOW</button>
      </div>
      <div class="card-body" id="cbody-${topicId}-${ci}">
        ${card.content}
      </div>
    </div>
  `).join('');
}

function toggleCard(topicId, ci) {
  const body = document.getElementById(`cbody-${topicId}-${ci}`);
  const btn = document.getElementById(`ebtn-${topicId}-${ci}`);
  const isOpen = body.classList.toggle('open');
  btn.textContent = isOpen ? 'HIDE' : 'SHOW';
}

function markDone(id) {
  if (doneSet.has(id)) {
    doneSet.delete(id);
  } else {
    doneSet.add(id);
  }
  saveDone();
  render();
}

function render() {
  const t = topics[currentTopic];
  buildNav();

  const prev = currentTopic > 0 ? topics[currentTopic - 1] : null;
  const next = currentTopic < topics.length - 1 ? topics[currentTopic + 1] : null;
  const isDone = doneSet.has(currentTopic);

  document.getElementById('main-content').innerHTML = `
    <div class="topic-header">
      <div class="topic-tag"><span class="topic-dot"></span> Topic ${(currentTopic + 1).toString().padStart(2,'0')} of ${topics.length.toString().padStart(2,'0')} · ${t.section || 'Beginner'}</div>
      <div class="topic-title">${t.title.replace(/([A-Z]|\()/g, m => `<span>${m}</span>`)
        .replace('<span>(<', '(<').replace('(</span>', '(')}</div>
      <div class="topic-meta">
        <span class="meta-pill ${t.difficulty}">${difficultyLabel[t.difficulty]}</span>
        <span class="meta-pill">${t.cards.length} sub-topic${t.cards.length > 1 ? 's' : ''}</span>
        ${isDone ? '<span class="meta-pill" style="border-color:var(--done);color:var(--done);">✓ Revised</span>' : ''}
      </div>
    </div>

    <div class="answer-card" style="margin-bottom:24px;background:rgba(255,255,255,0.02);">
      <div class="card-header" style="cursor:default;">
        <div class="card-icon" style="background:${t.iconBg};font-size:18px;">${t.icon}</div>
        <div class="card-q" style="font-size:14px;color:var(--muted);">Interview Question</div>
      </div>
      <div class="card-body open" style="padding:20px 24px;">
        <p style="font-size:16px;font-weight:700;color:var(--text);">${t.question}</p>
      </div>
    </div>

    ${buildCards(t.cards, t.id)}

    <button class="mark-done-btn ${isDone ? 'marked' : ''}" onclick="markDone(${currentTopic})">
      ${isDone ? '✓ Marked as Revised' : '○ Mark as Revised'}
    </button>

    <div class="nav-controls">
      ${prev ? `<button class="ctrl-btn" onclick="navigate(${currentTopic - 1})">← ${prev.title}</button>` : '<span></span>'}
      ${next ? `<button class="ctrl-btn primary" onclick="navigate(${currentTopic + 1})">${next.title} →</button>` : '<button class="ctrl-btn primary" onclick="navigate(0)">🎉 Start Over</button>'}
    </div>
  `;

  // auto-open first card
  setTimeout(() => {
    const firstBody = document.getElementById(`cbody-${t.id}-0`);
    const firstBtn = document.getElementById(`ebtn-${t.id}-0`);
    if (firstBody && !firstBody.classList.contains('open')) {
      firstBody.classList.add('open');
      if (firstBtn) firstBtn.textContent = 'HIDE';
    }
  }, 100);

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function navigate(id) {
  currentTopic = id;
  render();
}

render();
</script>
